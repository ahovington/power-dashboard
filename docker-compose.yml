services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME:-power_monitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - power-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-power_monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL:          ${DATABASE_URL}
      GO_ENV:                ${GO_ENV:-production}
      LOG_LEVEL:             ${LOG_LEVEL:-info}
      PORT:                  "8080"
      CORS_ALLOWED_ORIGIN:   ${CORS_ALLOWED_ORIGIN:-http://localhost}
      ENPHASE_API_KEY:       ${ENPHASE_API_KEY:-}
      ENPHASE_SYSTEM_ID:     ${ENPHASE_SYSTEM_ID:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-300}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - power-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - power-net

volumes:
  postgres_data:

networks:
  power-net:
    driver: bridge
